site_name: Notes
site_description: 个人长期笔记库
site_url: "https://mousebar01.github.io/notes/"

docs_dir: .mkdocs/docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  .git/
  .agents/
  .codex/
  site/
  .mkdocs/
  reference/repos/vibe-coding-cn/

not_in_nav: |
  AGENTS.md
  **/AGENTS.md

nav:
  - 首页: README.md
  - 索引:
      - index/README.md
      - Agent 系统学习索引: index/Agent 系统学习索引.md
  - Topics:
      - topics/README.md
      - Agent: topics/agent/README.md
      - LLM: topics/llm/README.md
      - AI Coding: topics/ai-coding/README.md
      - Software Engineering: topics/software-engineering/README.md
      - Algorithms: topics/algorithms/README.md
  - Projects:
      - projects/README.md
      - Hermes: projects/hermes/README.md
  - Reference: reference/README.md
  - Inbox: inbox/README.md
  - Reviews: reviews/README.md
  - Archive: archive/README.md
